version: 1

formatters:
  simple:
    format: '[%(asctime)s] %(levelname)s - %(name)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: logs/app.log
    
loggers:
  ingestion:
    level: INFO
    handlers: [console, file]
    propagate: no

  llm:
    level: INFO
    handlers: [console, file]
    propagate: no

  embedding:
    level: INFO
    handlers: [console, file]
    propagate: no

  sparse_vector:
    level: INFO
    handlers: [console, file]
    propagate: no

  retrieval:
    level: INFO
    handlers: [console, file]
    propagate: no
  
  



root:
  level: INFO
  handlers: [console, file]